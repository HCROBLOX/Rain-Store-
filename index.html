<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rain Store V1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0b0b0b;color:#fff;padding-bottom:80px}
.header{padding:18px;background:#111;border-bottom:1px solid #222}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo-icon{width:52px;height:52px;border-radius:14px;background:#00ff99;color:#000;
display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;
box-shadow:0 0 18px #00ff99}
.logo-title{color:#00ff99;font-size:24px;font-weight:bold}
.logo-sub{color:#888;font-size:12px}
.page{display:none;padding:18px}
.page.active{display:block}
.card,.service,.order{background:#111;border:1px solid #222;border-radius:16px;padding:15px;margin-top:12px}
.balance{font-size:32px;color:#00ff99;font-weight:bold}
.btn{width:100%;padding:12px;border:none;border-radius:10px;background:#00ff99;color:#000;
font-weight:bold;margin-top:10px}
input,select{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#1a1a1a;color:#fff}
.bottom-nav{position:fixed;bottom:0;left:0;width:100%;height:68px;background:#111;
display:flex;justify-content:space-around;align-items:center;border-top:1px solid #222}
.nav-btn{background:none;border:none;color:#fff;font-size:24px}
.nav-btn.active{color:#00ff99}
h2{margin-bottom:10px}
</style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <div class="logo-icon">R</div>
    <div>
      <div class="logo-title">Rain Store</div>
      <div class="logo-sub">Gaming Services</div>
    </div>
  </div>
</div>

<div id="home" class="page active">
  <h2>🏠 Trang Chủ</h2>
  <div class="card">
    <div>Số dư</div>
    <div class="balance">0đ</div>
  </div>
  <div class="card">
    <b>Thông báo</b><br>Chào mừng đến Rain Store V1.
  </div>
</div>

<div id="wallet" class="page">
  <h2>💰 Wallet</h2>
  <div class="card">
    <button class="btn" onclick="showDeposit('qr')">Nạp QR</button>
    <button class="btn" onclick="showDeposit('card')">Nạp Thẻ Cào</button>
  </div>

  <div id="qrDeposit" class="card" style="display:none">
    <input id="amount" type="number" placeholder="Nhập số tiền">
    <button class="btn" onclick="createQR()">Tạo QR</button>
    <div id="qrArea" style="display:none;margin-top:10px">
      <p id="orderCode"></p>
      <img id="qrImage" width="250">
    </div>
  </div>

  <div id="cardDeposit" class="card" style="display:none">
    <select><option>Viettel</option><option>Mobifone</option><option>Vinaphone</option></select>
    <input placeholder="Mệnh giá">
    <input placeholder="Seri">
    <input placeholder="Mã thẻ">
    <button class="btn">Gửi yêu cầu</button>
  </div>
</div>

<div id="shop" class="page">
  <h2>🛒 Shop</h2>
  <div class="service"><b>🎮 Cày Thuê</b><button class="btn">Đặt Ngay</button></div>
  <div class="service"><b>👑 Bán Tài Khoản</b><button class="btn">Mua Ngay</button></div>
  <div class="service"><b>💎 Vật Phẩm</b><button class="btn">Mua Ngay</button></div>
</div>

<div id="orders" class="page">
  <h2>📦 Orders</h2>
  <div class="order">RS-DEMO001<br>⏳ Đang xử lý</div>
</div>

<div id="profile" class="page">
  <h2>👤 Profile</h2>
  <div class="card">
    Tên: Khách<br><br>
    ID: USER001
  </div>
</div>

<div class="bottom-nav">
<button class="nav-btn active" onclick="showPage('home',this)">🏠</button>
<button class="nav-btn" onclick="showPage('wallet',this)">💰</button>
<button class="nav-btn" onclick="showPage('shop',this)">🛒</button>
<button class="nav-btn" onclick="showPage('orders',this)">📦</button>
<button class="nav-btn" onclick="showPage('profile',this)">👤</button>
</div>

<script>
function showPage(id,btn){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
 btn.classList.add('active');
}
function showDeposit(type){
 document.getElementById('qrDeposit').style.display='none';
 document.getElementById('cardDeposit').style.display='none';
 if(type==='qr') document.getElementById('qrDeposit').style.display='block';
 if(type==='card') document.getElementById('cardDeposit').style.display='block';
}
function createQR(){
 let amount=document.getElementById('amount').value;
 if(!amount){alert('Nhập số tiền');return;}
 let code='RS-'+Math.random().toString(36).substring(2,8).toUpperCase();
 document.getElementById('orderCode').innerText='Mã giao dịch: '+code;
 document.getElementById('qrImage').src='https://img.vietqr.io/image/mb-123456789-compact.png?amount='+amount+'&addInfo='+code;
 document.getElementById('qrArea').style.display='block';
}
</script>
<script type="module" src="app.js"></script>
</body>
      </html>
